<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .card {
      width: 100%;
      max-width: 400px;
      padding: 48px 40px;
      background: #18181f;
      border: 1px solid #2a2a35;
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
    }

    .logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #7c6aff, #a855f7);
      border-radius: 12px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg {
      width: 24px;
      height: 24px;
      fill: #fff;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #f0f0f5;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 14px;
      color: #6b6b80;
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #9090a8;
      margin-bottom: 7px;
      letter-spacing: 0.2px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      background: #111118;
      border: 1px solid #2a2a35;
      border-radius: 8px;
      font-size: 14px;
      color: #f0f0f5;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input::placeholder {
      color: #3d3d50;
    }

    input:focus {
      border-color: #7c6aff;
      box-shadow: 0 0 0 3px rgba(124, 106, 255, 0.15);
    }

    input.error {
      border-color: #f75f5f;
      box-shadow: 0 0 0 3px rgba(247, 95, 95, 0.12);
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #4d4d62;
      padding: 4px;
      display: flex;
      transition: color 0.15s;
    }

    .toggle-pw:hover {
      color: #9090a8;
    }

    .toggle-pw svg {
      width: 18px;
      height: 18px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      margin-top: 4px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #6b6b80;
      user-select: none;
    }

    .remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #7c6aff;
      cursor: pointer;
    }

    .forgot {
      font-size: 13px;
      color: #7c6aff;
      text-decoration: none;
      transition: color 0.15s;
    }

    .forgot:hover {
      color: #a088ff;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #7c6aff, #9b5cf6);
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      letter-spacing: 0.1px;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: #3a3a4a;
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #2a2a35;
    }

    .btn-oauth {
      width: 100%;
      padding: 11px;
      background: #111118;
      border: 1px solid #2a2a35;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 500;
      color: #c0c0d0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-oauth:hover {
      background: #1c1c26;
      border-color: #3a3a50;
    }

    .btn-oauth svg {
      width: 18px;
      height: 18px;
    }

    .signup-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #6b6b80;
    }

    .signup-link a {
      color: #7c6aff;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }

    .signup-link a:hover {
      color: #a088ff;
    }

    .error-msg {
      font-size: 12px;
      color: #f75f5f;
      margin-top: 5px;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn-primary .btn-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
  </style>
</head>
<body>

<div class="card">

  <div class="logo">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18L20 8.5v7L12 19.82 4 15.5v-7L12 4.18z"/>
    </svg>
  </div>

  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to your account to continue</p>

  <form id="loginForm" novalidate>

    <div class="field">
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        placeholder="you@example.com"
        autocomplete="email"
        required
      />
      <div class="error-msg" id="emailError">Please enter a valid email address.</div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="password-wrapper">
        <input
          type="password"
          id="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
        <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
          <!-- eye icon -->
          <svg id="eyeShow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <!-- eye-off icon -->
          <svg id="eyeHide" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
      <div class="error-msg" id="passwordError">Password must be at least 6 characters.</div>
    </div>

    <div class="row">
      <label class="remember">
        <input type="checkbox" id="remember" />
        Remember me
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <button type="submit" class="btn-primary" id="submitBtn">
      <span class="btn-content">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">Sign in</span>
      </span>
    </button>

  </form>

  <div class="divider">or continue with</div>

  <button class="btn-oauth" type="button">
    <!-- Google -->
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <p class="signup-link">Don't have an account? <a href="#">Sign up</a></p>

</div>

<script>
  const form = document.getElementById('loginForm');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const emailError = document.getElementById('emailError');
  const passwordError = document.getElementById('passwordError');
  const submitBtn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  const togglePw = document.getElementById('togglePw');
  const eyeShow = document.getElementById('eyeShow');
  const eyeHide = document.getElementById('eyeHide');

  togglePw.addEventListener('click', () => {
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    eyeShow.style.display = isPassword ? 'none' : '';
    eyeHide.style.display = isPassword ? '' : 'none';
  });

  function validateEmail(val) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
  }

  emailInput.addEventListener('input', () => {
    if (emailInput.classList.contains('error')) {
      const ok = validateEmail(emailInput.value.trim());
      emailInput.classList.toggle('error', !ok);
      emailError.classList.toggle('visible', !ok);
    }
  });

  passwordInput.addEventListener('input', () => {
    if (passwordInput.classList.contains('error')) {
      const ok = passwordInput.value.length >= 6;
      passwordInput.classList.toggle('error', !ok);
      passwordError.classList.toggle('visible', !ok);
    }
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = emailInput.value.trim();
    const password = passwordInput.value;
    let valid = true;

    if (!validateEmail(email)) {
      emailInput.classList.add('error');
      emailError.classList.add('visible');
      valid = false;
    } else {
      emailInput.classList.remove('error');
      emailError.classList.remove('visible');
    }

    if (password.length < 6) {
      passwordInput.classList.add('error');
      passwordError.classList.add('visible');
      valid = false;
    } else {
      passwordInput.classList.remove('error');
      passwordError.classList.remove('visible');
    }

    if (!valid) return;

    // Simulate API call
    submitBtn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Signing in…';

    await new Promise(r => setTimeout(r, 1500));

    spinner.style.display = 'none';
    btnText.textContent = 'Sign in';
    submitBtn.disabled = false;

    alert(`Logged in as ${email}`);
  });
</script>

</body>
</html>
